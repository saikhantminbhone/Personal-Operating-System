version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: saikhant_os_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saikhant_os
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saikhant_os_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: saikhant_os_search
    restart: unless-stopped
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data
    environment:
      MEILI_NO_ANALYTICS: 'true'

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
